<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Order Rescue · Asistente IA</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <h1>Asistente analítico</h1>
    <p class="sub">Pregunta en lenguaje natural sobre los patrones de sustitución. Respuestas basadas en los datos reales del sistema.</p>

    <div class="chat-layout">
      <div class="quick">
        <p class="muted" style="font-size:12px;text-transform:uppercase;letter-spacing:.4px">Preguntas rápidas</p>
        <div id="quick-buttons"></div>
      </div>

      <div class="chat-main">
        <div class="chat-head">
          <strong>Order Rescue AI</strong>
          <div>
            <span class="provider" id="provider">—</span>
            <button class="ghost" id="btn-clear" style="margin-left:10px;padding:4px 10px;font-size:12px">Nueva conversación</button>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="chat-input">
          <input id="chat-input" placeholder="Escribe tu pregunta…" autocomplete="off" />
          <button id="btn-send">Enviar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="chat.js"></script>
  <script>renderNav("chat.html"); initChat();</script>
</body>
</html>
