<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Order Rescue · Pedido y Simulador</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <h1>Detalle de pedido & simulador</h1>
    <p class="sub">Consulta el riesgo de un pedido existente o simula uno nuevo antes de que salga del CEDIS.</p>

    <!-- ===== Buscar pedido existente ===== -->
    <div class="panel" style="margin-bottom:18px">
      <h3>Buscar pedido existente</h3>
      <div class="row">
        <div style="flex:1;min-width:280px"><label class="fld">ID de pedido</label>
          <input id="ped-id" placeholder="ej. 8839440000000000000" /></div>
        <div><button id="btn-buscar">Buscar</button></div>
      </div>
      <div id="ped-result" class="hidden" style="margin-top:16px"></div>
    </div>

    <!-- ===== Simulador ===== -->
    <div class="panel">
      <h3>Simular pedido nuevo</h3>
      <div class="row">
        <div style="min-width:220px"><label class="fld">CEDIS</label><select id="sim-cedis"></select></div>
        <div style="flex:1;min-width:280px"><label class="fld">SKU</label>
          <input id="sim-sku" list="sku-list" placeholder="Escribe para buscar…" />
          <datalist id="sku-list"></datalist></div>
        <div style="width:110px"><label class="fld">Cantidad</label><input id="sim-qty" type="number" value="12" min="1" /></div>
        <div><button class="ghost" id="btn-add">+ Agregar</button></div>
      </div>

      <table id="sim-lineas-tbl" class="hidden" style="margin-top:14px">
        <thead><tr><th>SKU</th><th class="num">Cantidad</th><th></th></tr></thead>
        <tbody id="sim-lineas"></tbody>
      </table>

      <div class="row" style="margin-top:14px">
        <button id="btn-calcular">Calcular riesgo</button>
        <button class="ghost" id="btn-reset">Vaciar</button>
      </div>
      <div id="sim-result" class="hidden" style="margin-top:18px"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="pedido.js"></script>
  <script>renderNav("pedido.html"); initPedido();</script>
</body>
</html>
